gnb_id: {{ .gnb_id }}
gnb_du_id: {{ .gnb_du_id }}
gnb_id_bit_length: {{ .gnb_id_length }}

log:
  filename: stdout
  all_level: error
  config_level: debug

f1u:
  socket:
    - bind_addr: __DU_BIND_ADDR__

f1ap:
  cu_cp_addr: {{ .cu_f1ap_ip }}
  bind_addr: __DU_BIND_ADDR__

# Proxy sidecar listens on localhost — DU-High connects here.
split6_network:
  use_network: true
  log_level: error
  du_low_address: 127.0.0.1
  du_low_control_port: 9997
  du_low_slot_port: 9998

fapi:
  l2_nof_slots_ahead: 8

cell_cfg:
  dl_arfcn: {{ .arfcn }}
  band: 77
  channel_bandwidth_MHz: {{ .bandwidth }}
  common_scs: 30
  plmn: "99999"
  tac: 1
  pci: {{ .vlan }}
  sector_id: {{ .vlan }}
  nof_antennas_dl: 4
  nof_antennas_ul: 4
  srs:
    srs_period_ms: 320
    srs_max_nof_sym_per_slot: 2
  sched_expert_cfg:
    ta_sched_cfg:
      ta_measurement_slot_period: 160
      ta_cmd_offset_threshold: -1
      ta_target: 1
      ta_update_measurement_ul_sinr_threshold: 10
    harq_drain:
      retx_max_mcs: 10
      max_drain_slots: 100
  prach:
    prach_config_index: 7
    prach_root_sequence_index: {{ .vlan }}
    zero_correlation_zone: 0
    prach_frequency_start: 0
    preamble_trans_max: 4
    power_ramping_step_db: 4
  pdsch:
    olla_target_bler: 0.25
    dmrs_additional_position: 2
  pusch:
    olla_target_bler: 0.1
    dmrs_additional_position: 2
  tdd_ul_dl_cfg:
    dl_ul_tx_period: 10
    nof_dl_slots: 7
    nof_dl_symbols: 6
    nof_ul_slots: 2
    nof_ul_symbols: 4
  ssb:
    ssb_block_power_dbm: -16

pcap:
  mac_enable: false
  mac_filename: /tmp/du_mac.pcap
  f1ap_enable: false
  f1ap_filename: /tmp/du_f1ap.pcap
  f1u_enable: false
  f1u_filename: /tmp/du_f1u.pcap
