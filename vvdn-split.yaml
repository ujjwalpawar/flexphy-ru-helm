kind: Pod
metadata:
  name: srsran-split-hrb2
  namespace: srsran-split-vvdn
  labels:
    app: dpdk
spec:
  nodeSelector:
    kubernetes.io/hostname: "k8s-worker5"
  initContainers:
  - name: check-cu-up
    image: ubuntu:latest
    command: ["bash", "-c"]
    args:
    - apt update &&
      apt install -y nmap &&
      until nmap -sY -p $SRSRAN_SPLIT_CU_SERVICE_PORT $SRSRAN_SPLIT_CU_SERVICE_HOST | grep "$SRSRAN_SPLIT_CU_SERVICE_PORT/sctp open" &> /dev/null; do echo "Waiting for CU to be up..."; sleep 2; done
  containers:
  - name: srsran
    image: ambroserb3/netsys-edi-public:monolithic
    command: ["bash", "-c"]
    args:
    - apt update &&
      apt install -y iproute2 libatomic1 nano iproute2 &&
      sed "s/__DU_BIND_ADDR__/$POD_IP/g" /config/du.conf > /tmp/du.conf &&
      sed -i "s/__CU_ADDR__/$SRSRAN_SPLIT_CU_SERVICE_HOST/g" /tmp/du.conf &&
      taskset -c $CPU_CORES chrt -f 99 srsdu -c /tmp/du.conf
    securityContext:
      privileged: true  # Required for DPDK
    resources:
      requests:
        memory: "16Gi"
        hugepages-1Gi: "4Gi"
      limits:
        memory: "16Gi"
        hugepages-1Gi: "4Gi"
    volumeMounts:
    - name: hugepage
      mountPath: /dev/hugepages
    - mountPath: /config
      name: ran-config
    env:
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: CPU_CORES
      value: "38-49"
  - name: metrics
    image: ubuntu:latest
    command: ["bash", "-c"]
    args:
    - apt update &&
      apt install -y python3 &&
      python3 /etc/scripts/metrics-collect.py 127.0.0.1 55555 /tmp/metrics.log
    volumeMounts:
    - mountPath: /etc/scripts
      name: metrics-collect
  volumes:
  - name: hugepage
    emptyDir:
      medium: HugePages
  - name: ran-config
    configMap:
      name: srsran-split-hrb2-config
      items:
      - key: du.conf
        path: du.conf
  - name: metrics-collect
    configMap:
      name: metrics-collect-script
      items:
      - key: metrics-collect.py
        path: metrics-collect.py
