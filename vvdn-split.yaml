# Source: new-ru-deploy/templates/srsran-split/du-vvdn-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: srsran-split-mlb2-config
  namespace: srsran-split-vvdn
data:
  du.conf: |
    gnb_id: 1
    gnb_du_id: 8
    gnb_id_bit_length: 22
    metrics:
      enable_json_metrics: true
      addr: 127.0.0.1
      port: 55555
    f1ap:
      cu_cp_addr: __CU_ADDR__
      bind_addr: __DU_BIND_ADDR__
    ru_ofh:
      t1a_max_cp_dl: 470
      t1a_min_cp_dl: 285
      t1a_max_cp_ul: 390
      t1a_min_cp_ul: 285
      t1a_max_up: 350
      t1a_min_up: 125
      ta4_max: 180
      ta4_min: 50
      is_prach_cp_enabled: true
      compr_method_ul: bfp
      compr_bitwidth_ul: 9
      compr_method_dl: bfp
      compr_bitwidth_dl: 9
      compr_method_prach: bfp
      compr_bitwidth_prach: 9
      enable_ul_static_compr_hdr: true
      enable_dl_static_compr_hdr: true
      iq_scaling: 5.5
      cells:
        - network_interface: 0000:86:09.0
          ru_mac_addr: 98:ae:71:04:90:e3
          du_mac_addr: 00:11:22:33:33:99
          vlan_tag_cp: 8
          vlan_tag_up: 8
          prach_port_id: [4, 5, 6, 7]
          dl_port_id: [0, 1, 2, 3]
          ul_port_id: [0, 1, 2, 3]
    cell_cfg:
      dl_arfcn: 660000
      band: 77
      channel_bandwidth_MHz: 100
      common_scs: 30
      plmn: "99999"
      tac: 1
      pci: 8
      sector_id: 8
      nof_antennas_dl: 4
      nof_antennas_ul: 4
    #    max_ue_mcs: 2
    #    fixed_rar_mcs: 0
      prach:
        prach_config_index: 159
        prach_root_sequence_index: 8
        zero_correlation_zone: 0
        prach_frequency_start: 0
      pucch:
        sr_period_ms: 20
        f0_or_f1_nof_cell_res_sr: 15
        f2_or_f3_or_f4_nof_cell_res_csi: 15
      csi:
        csi_rs_period: 40
      pusch:
        dmrs_additional_position: 2
      tdd_ul_dl_cfg:
        nof_dl_symbols: 6
        nof_ul_symbols: 2
        nof_dl_slots: 7
        nof_ul_slots: 2
    log:
      filename: stdout
      all_level: error
    hal:
      eal_args: "--lcores (14-15)@(16-25) -a 0000:86:09.0"
    pcap:
      mac_enable: false
      mac_filename: /tmp/gnb_mac.pcap
---
