# Source: new-ru-deploy/templates/srsran-split/metrics-script.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-collect-script
  namespace: srsran-split-vvdn
data:
  metrics-collect.py: |
    import sys
    import socket
    import json

    server_socket = socket.socket(family=socket.AF_INET, type=socket.SOCK_DGRAM)
    server_socket.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
    server_socket.bind((sys.argv[1], int(sys.argv[2])))

    while True:
        line = server_socket.recv(1024**2).decode()
        if not line:
            continue
        json_string = json.dumps(json.loads(line))
        with open(sys.argv[3], "a") as f:
            f.write(f'{json_string}\n')
        print(json_string)
---
