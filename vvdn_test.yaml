apiVersion: v1
kind: Namespace
metadata:
  name: srsran-split
---
# Source: may-ru-deploy/templates/srsran-split/cu-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: srsran-split-cu-config
  namespace: srsran-split
data:
  cu.conf: |
    gnb_id_bit_length: 22
    gnb_id: 1
    log:
      filename: stdout
      all_level: error
      ngap_level: info
      config_level: debug
      cu_level: debug
    pcap:
      f1ap_filename: /tmp/gnb_f1ap.pcap
      f1ap_enable: true
      e1ap_filename: /tmp/gnb_e1ap.pcap
      e1ap_enable: true
      ngap_filename: /tmp/gnb_ngap.pcap
      ngap_enable: true
    cu_cp:
      max_nof_dus: 2
      request_pdu_session_timeout: 1
      amf:
        addr: 172.30.129.35
        port: 38412
        bind_addr: 10.0.0.1
        sctp_nodelay: false
        supported_tracking_areas:
        - tac: 1
          plmn_list:
          - plmn: "99999"
            tai_slice_support_list:
            - sst: 1
      f1ap:
        bind_addr: 10.0.0.1
      rrc:
        force_reestablishment_fallback: true
        rrc_procedure_timeout_ms: 500
      mobility:
        trigger_handover_from_measurements: true
        cells:
        - nr_cell_id: 16407
          periodic_report_cfg_id: 1
          ncells:
          - nr_cell_id: 16396
        - nr_cell_id: 16396
          periodic_report_cfg_id: 1
          ncells:
          - nr_cell_id: 16407
        report_configs:
        - report_cfg_id: 1
          report_type: periodical
          event_triggered_report_type: a3
          meas_trigger_quantity: rsrp
          meas_trigger_quantity_offset_db: 2
          hysteresis_db: 2
          report_interval_ms: 480
          time_to_trigger_ms: 0
        - report_cfg_id: 2
          report_type: event_triggered
          event_triggered_report_type: a3
          meas_trigger_quantity: rsrp
          meas_trigger_quantity_offset_db: 2
          hysteresis_db: 0
          time_to_trigger_ms: 100
          report_interval_ms: 1024
    cu_up:
      ngu:
        gtpu:
          queue_size: 8192
          batch_size: 512
      f1u:
        socket:
        - bind_addr: 172.30.129.57
          ext_addr: auto
          udp:
            max_rx_msgs: 512
            pool_threshold: 1
    metrics:
      enable_log: false
      enable_json: true
      addr: 10.233.29.41
      port: 55555
      layers:
        enable_app_usage: true
        enable_pdcp: true
      periodicity:
        cu_cp_report_period: 1000
