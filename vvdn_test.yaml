# Source: may-ru-deploy/templates/srsran-split/metrics-script.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-collect-script
  namespace: srsran-split
data:
  metrics-collect.py: |
    import sys
    import socket
    import json
    listen_port = int(sys.argv[2])
    forward_host = sys.argv[3]
    forward_port = listen_port
    server_socket = socket.socket(family=socket.AF_INET, type=socket.SOCK_DGRAM)
    server_socket.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
    server_socket.bind((sys.argv[1], int(sys.argv[2])))
    print("Starting collector")
    forward_socket = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
    while True:
        data, addr = server_socket.recvfrom(1024**2)
        line = data.decode()
        if not line:
            continue
        json_string = json.dumps(json.loads(line))
        with open(sys.argv[4], "a") as f:
            f.write(f'{json_string}\n')
        print(json_string)
        forward_socket.sendto(data, (forward_host, forward_port))
---
# Source: may-ru-deploy/templates/srsran-split/cu-svc.yaml
apiVersion: v1
kind: Service
metadata:
  name: srsran-split-cu
  namespace: srsran-split
spec:
  ports:
  - port: 38472
    targetPort: 38472
    protocol: SCTP
  selector:
    app: srsran-split-cu
---
# Source: may-ru-deploy/templates/srsran-split/cu-pod.yaml
apiVersion: v1
kind: Pod
metadata:
  name: srsran-split-cu
  namespace: srsran-split
  labels:
    app: srsran-split-cu
spec:
  hostNetwork: true
  nodeSelector:
    kubernetes.io/hostname: k8s-worker1
  containers:
  - name: srsran
    image: ujjwal1997/srsran:latest
    command: ["bash", "-c"]
    args:
    - apt update &&
      apt install -y iproute2 libatomic1 nano iproute2 &&
      sed "s/__CU_BIND_ADDR__/$POD_IP/g" /config/cu.conf > /tmp/cu.conf &&
      taskset -c $CPU_CORES chrt -f 99 srscu -c /tmp/cu.conf cu_cp security --nea_pref_list=nea2,nea1,nea3,nea0
    securityContext:
      privileged: true  # Required for DPDK
    resources:
      requests:
        memory: "16Gi"
        hugepages-1Gi: "4Gi"
      limits:
        memory: "16Gi"
        hugepages-1Gi: "4Gi"
    volumeMounts:
    - name: hugepage
      mountPath: /dev/hugepages
    - mountPath: /config
      name: ran-config
    env:
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: CPU_CORES
      value: "26-49"
  - name: metrics
    image: ubuntu:latest
    command: ["bash", "-c"]
    args:
    - apt update &&
      apt install -y python3 &&
      python3 /etc/scripts/metrics-collect.py 127.0.0.1 55555 10.233.29.41 /tmp/metrics.log
    volumeMounts:
    - mountPath: /etc/scripts
      name: metrics-collect
  volumes:
  - name: hugepage
    emptyDir:
      medium: HugePages
  - name: ran-config
    configMap:
      name: srsran-split-cu-config
      items:
      - key: cu.conf
        path: cu.conf
  - name: metrics-collect
    configMap:
      name: metrics-collect-script
      items:
      - key: metrics-collect.py
        path: metrics-collect.py
---
