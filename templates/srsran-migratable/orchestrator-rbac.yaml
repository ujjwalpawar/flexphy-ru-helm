{{- $ru_list_yaml := $.Files.Get "extra-config.yaml" | fromYaml -}}
{{- $radios := $ru_list_yaml.ru_list -}}

{{- if gt (len $radios) 0 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: migration-orchestrator
  namespace: srsran-migratable
---
# The orchestrator needs to create/delete/patch pods and configmaps for shadow DU-Low management.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: migration-orchestrator
  namespace: srsran-migratable
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete", "patch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: migration-orchestrator
  namespace: srsran-migratable
subjects:
- kind: ServiceAccount
  name: migration-orchestrator
  namespace: srsran-migratable
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: migration-orchestrator
{{- end }}
