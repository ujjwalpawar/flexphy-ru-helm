{{- /*
  Generates a single setup.sh script run by the nic-vf-setup DaemonSet on every worker node.

  For each NIC port listed in .Values.nicPorts:
    1. Reset VF count to 0 (clean slate — removes any previously allocated VFs)
    2. Create N VFs (one per radio in ru_list)
    3. Assign each radio's du_mac to its fixed vf_index on this port
    4. Bind each VF to vfio-pci (required by DPDK in DU-Low)

  Adding a new radio: append to ru_list in extra-config.yaml and run helm upgrade.
  Adding a new port:  append to nicPorts in values.yaml and run helm upgrade.
  No hardcoded values anywhere.
*/ -}}
{{- $ru_list_yaml := $.Files.Get "extra-config.yaml" | fromYaml -}}
{{- $ruList := $ru_list_yaml.ru_list -}}
{{- $numVFs := len $ruList -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nic-vf-setup-scripts
  namespace: srsran-migratable
  labels:
    app: nic-vf-setup
data:
  setup.sh: |
    #!/bin/sh
    set -e

    log() { echo "[nic-vf-setup] $*"; }

    NUM_VFS={{ $numVFs }}

    # -----------------------------------------------------------------------
    # Step 1+2: Reset VFs to 0 then recreate on every port
    # -----------------------------------------------------------------------
    {{- range $.Values.nicPorts }}
    SYSF="/sys/class/net/{{ . }}/device/sriov_numvfs"
    if [ -f "$SYSF" ]; then
      log "Resetting {{ . }} VFs to 0"
      echo 0 > "$SYSF" || true
      sleep 0.2
      log "Creating $NUM_VFS VFs on {{ . }}"
      echo $NUM_VFS > "$SYSF"
      sleep 1
    else
      log "SKIP {{ . }}: not present on this node"
    fi
    {{- end }}

    # -----------------------------------------------------------------------
    # Step 3: Assign du_mac to each radio's fixed vf_index on every port
    # -----------------------------------------------------------------------
    {{- range $port := $.Values.nicPorts }}
    if [ -d "/sys/class/net/{{ $port }}" ]; then
      log "Setting MACs on {{ $port }}"
      {{- range $ru := $ruList }}
      ip link set {{ $port }} vf {{ $ru.vf_index }} mac {{ $ru.du_mac }} trust on spoofchk off 2>/dev/null \
        && log "  vf{{ $ru.vf_index }} -> {{ $ru.du_mac }} ({{ $ru.name }})" \
        || log "  WARN: failed to set vf{{ $ru.vf_index }} on {{ $port }}"
      {{- end }}
    fi
    {{- end }}

    # -----------------------------------------------------------------------
    # Step 4: Bind all VFs to vfio-pci
    # -----------------------------------------------------------------------
    log "Loading vfio-pci module"
    modprobe vfio-pci || true

    for VF_PATH in /sys/class/net/*/device/virtfn*; do
      [ -L "$VF_PATH" ] || continue
      PCI=$(readlink "$VF_PATH" | xargs basename 2>/dev/null) || continue
      [ -e "/sys/bus/pci/devices/$PCI" ] || continue

      DRIVER_LINK="/sys/bus/pci/devices/$PCI/driver"
      if [ -L "$DRIVER_LINK" ]; then
        CURRENT=$(basename "$(readlink "$DRIVER_LINK")")
        if [ "$CURRENT" = "vfio-pci" ]; then
          log "  $PCI already bound to vfio-pci"
          continue
        fi
        echo "$PCI" > "${DRIVER_LINK}/unbind" 2>/dev/null || true
      fi

      echo "vfio-pci" > "/sys/bus/pci/devices/$PCI/driver_override" 2>/dev/null || true
      echo "$PCI" > /sys/bus/pci/drivers/vfio-pci/bind 2>/dev/null \
        && log "  Bound $PCI to vfio-pci" \
        || log "  WARN: could not bind $PCI (may need iommu enabled)"
    done

    log "VF setup complete on $(hostname)"
