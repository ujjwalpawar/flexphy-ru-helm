{{- /*
  Single CU pod shared by all migratable DU-High instances.
*/ -}}
{{- $ru_list_yaml := $.Files.Get "extra-config.yaml" | fromYaml -}}
{{- $radios := list -}}
{{- range $desiredRadio := .Values.desiredRadios -}}
  {{- if eq $desiredRadio.type "srsran-migratable" -}}
    {{- range $radio := $ru_list_yaml.ru_list -}}
      {{- if eq $radio.name $desiredRadio.name -}}
        {{- $radios = append $radios $radio -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if gt (len $radios) 0 }}
apiVersion: v1
kind: Pod
metadata:
  name: srsran-mig-cu
  namespace: srsran-migratable
  labels:
    app: srsran-mig-cu
spec:
  hostNetwork: true
  nodeSelector:
    kubernetes.io/hostname: {{ .Values.splitCUConf.node }}
  initContainers:
  - name: wait-amf
    image: ubuntu:latest
    securityContext:
      capabilities:
        add: ["NET_RAW", "NET_ADMIN"]
    command: ["bash", "-c"]
    args:
    - apt-get update -qq && apt-get install -y -qq nmap &&
      until nmap -sY -p 38412 {{ .Values.amf_ip }} | grep "38412/sctp open" &>/dev/null; do
        echo "Waiting for AMF at {{ .Values.amf_ip }}:38412 ..."; sleep 2;
      done
  containers:
  - name: cu
    image: {{ .Values.image  }}
    imagePullPolicy: Always
    command: ["bash", "-c"]
    args:
    - START_TIME="$(date +%Y%m%d_%H%M%S)" &&
      PCAP_DIR="/pcap/cu_${START_TIME}" &&
      mkdir -p "$PCAP_DIR" &&
      sed "s/__CU_BIND_ADDR__/$POD_IP/g" /config/cu.conf > /tmp/cu.conf &&
      sed -i "s|__PCAP_DIR__|${PCAP_DIR}|g" /tmp/cu.conf &&
      taskset -c {{ .Values.splitCUConf.cores }} chrt -f 99 srscu -c /tmp/cu.conf \
        cu_cp security --nea_pref_list=nea0,nea1,nea3,nea2
    securityContext:
      privileged: true
    resources:
      requests:
        memory: "8Gi"
        hugepages-1Gi: "4Gi"
      limits:
        memory: "8Gi"
        hugepages-1Gi: "4Gi"
    volumeMounts:
    - name: hugepage
      mountPath: /dev/hugepages
    - name: ran-config
      mountPath: /config
    - name: pcap
      mountPath: /pcap
    env:
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
  volumes:
  - name: hugepage
    emptyDir:
      medium: HugePages
  - name: ran-config
    configMap:
      name: srsran-mig-cu-config
      items:
      - key: cu.conf
        path: cu.conf
  - name: pcap
    hostPath:
      path: {{ .Values.cuPcapHostPath | default "/home/netsys/netdt_data" | quote }}
      type: DirectoryOrCreate
---
{{- end }}
