{{- /*
  Per-DU ConfigMap for srsdu_low (upper PHY + OFH to RU).
  Listens for FAPI from the proxy on ports 10001/10002.
  Uses DPDK for the OFH RU interface.
*/ -}}
{{- $ru_list_yaml := $.Files.Get "extra-config.yaml" | fromYaml -}}

{{- $radios := list }}
{{- range $desiredRadio := .Values.desiredRadios }}
  {{- if eq $desiredRadio.type "srsran-migratable" }}
    {{- range $radio := $ru_list_yaml.ru_list }}
      {{- if eq $radio.name $desiredRadio.name }}
        {{- $radios = append $radios $radio }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}

{{- range $radio := $radios }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: srsran-mig-du-low-{{ $radio.name | lower }}-config
  namespace: srsran-migratable
data:
  du_low.conf: |
    log:
      filename: stdout
      all_level: error
      phy_level: error

    expert_phy:
      max_request_headroom_slots: 6
      max_proc_delay: 6
      allow_request_on_empty_uplink_slot: true

    # Listens for FAPI connections from the proxy.
    # Proxy reaches this pod via the du-low Service on these ports.
    split6_network:
      use_network: true
      log_level: error
      control_bind_ip: 0.0.0.0
      control_port: 10001
      slot_bind_ip: 0.0.0.0
      slot_port: 10002

    # Migration support: allows this DU-Low to start as a shadow
    # during a migration and be promoted to active by the proxy.
    migration:
      enabled: true
      log_level: info
      controller_bind_ip: 0.0.0.0
      controller_port: 9990
      warmup_slots: 100
      min_ready_slots: 20
      start_in_shadow_mode: false
      proxy_address: srsran-mig-proxy-{{ $radio.name | lower }}-svc.srsran-migratable.svc.cluster.local
      proxy_registration_port: 10005

    ru_ofh:
      t1a_max_cp_dl: 535
      t1a_min_cp_dl: 286
      t1a_max_cp_ul: 535
      t1a_min_cp_ul: 286
      t1a_max_up: 390
      t1a_min_up: 80
      ta4_max: 500
      ta4_min: 25
      is_prach_cp_enabled: false
      ignore_ecpri_payload_size: true
      compr_method_ul: bfp
      compr_bitwidth_ul: 9
      compr_method_dl: bfp
      compr_bitwidth_dl: 9
      compr_method_prach: bfp
      compr_bitwidth_prach: 9
      enable_ul_static_compr_hdr: true
      enable_dl_static_compr_hdr: true
      iq_scaling: 10
      cells:
      - network_interface: {{ $radio.dpdk_pci_id }}
        ru_mac_addr: {{ $radio.ru_mac }}
        du_mac_addr: {{ $radio.du_mac }}
        vlan_tag_cp: {{ $radio.vlan }}
        vlan_tag_up: {{ $radio.vlan }}
        prach_port_id: [4, 5, 6, 7]
        dl_port_id: [0, 1, 2, 3]
        ul_port_id: [0, 1, 2, 3]

    hal:
      eal_args: "--lcores (0-1)@({{ $radio.cpu_cores_p2 }}) -a {{ $radio.dpdk_pci_id }}"

    expert_execution:
      affinities:
        ru_timing_cpu: {{ $radio.cpu_cores_p1 }}
{{- end }}
