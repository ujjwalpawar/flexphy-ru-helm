{{- /*
  Per-DU Pod for srsdu_low (upper PHY + OFH to RU).
  Requires hostNetwork or DPDK privileged access for the RU interface.
  The proxy (in the DU-High pod) connects to this pod via du-low-svc.
*/ -}}
{{- $ru_list_yaml := $.Files.Get "extra-config.yaml" | fromYaml -}}

{{- $radios := list }}
{{- range $desiredRadio := .Values.desiredRadios }}
  {{- if eq $desiredRadio.type "srsran-migratable" }}
    {{- range $radio := $ru_list_yaml.ru_list }}
      {{- if eq $radio.name $desiredRadio.name }}
        {{- $radios = append $radios $radio }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}

{{- range $radio := $radios }}
---
apiVersion: v1
kind: Pod
metadata:
  name: srsran-mig-du-low-{{ $radio.name | lower }}
  namespace: srsran-migratable
  labels:
    app: srsran-mig-du-low
    du-name: {{ $radio.name | lower }}
spec:
  nodeSelector:
    kubernetes.io/hostname: {{ $radio.node | quote }}
  containers:
  - name: du-low
    image: {{ $.Values.image  }}
    imagePullPolicy: Always
    command: ["bash", "-c"]
    args:
    - srsdu_low -c /config/du_low.conf
    securityContext:
      privileged: true   # Required for DPDK + hugepages + NIC binding
    resources:
      requests:
        memory: "16Gi"
        hugepages-1Gi: "8Gi"
      limits:
        memory: "16Gi"
        hugepages-1Gi: "8Gi"
    ports:
    - name: fapi-ctrl
      containerPort: 10001
      protocol: TCP
    - name: fapi-slot
      containerPort: 10002
      protocol: TCP
    - name: mig-ctrl
      containerPort: 9990
      protocol: TCP
    volumeMounts:
    - name: hugepage
      mountPath: /dev/hugepages
    - name: du-low-config
      mountPath: /config
    env:
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
  volumes:
  - name: hugepage
    emptyDir:
      medium: HugePages
  - name: du-low-config
    configMap:
      name: srsran-mig-du-low-{{ $radio.name | lower }}-config
      items:
      - key: du_low.conf
        path: du_low.conf
{{- end }}
