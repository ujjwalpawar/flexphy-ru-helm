{{- $ru_list_yaml := $.Files.Get "extra-config.yaml" | fromYaml -}}
{{- $radios := list -}}
{{- range $desiredRadio := .Values.desiredRadios -}}
  {{- if eq $desiredRadio.type "srsran-migratable" -}}
    {{- range $radio := $ru_list_yaml.ru_list -}}
      {{- if eq $radio.name $desiredRadio.name -}}
        {{- $radios = append $radios $radio -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if gt (len $radios) 0 }}
apiVersion: v1
kind: Namespace
metadata:
  name: srsran-migratable
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
{{- end }}
