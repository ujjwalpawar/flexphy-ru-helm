{{- /*
  Expose the full ru_list as a ConfigMap mounted into the orchestrator pod.
  The orchestrator's VfRegistry loads this at startup to resolve radio names
  to hardware identity (vf_index, MACs, vlan).

  Node/interface/PCI are NOT stored here — they are resolved dynamically at
  start/migrate time by querying the vf-pci-map-<node> ConfigMaps and checking
  which VF claims are already in use via pod annotations.
*/ -}}
{{- $ru_list_yaml := $.Files.Get "extra-config.yaml" | fromYaml -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ru-inventory
  namespace: srsran-migratable
data:
  ru_list.yaml: |
    ru_list:
    {{- range $ru_list_yaml.ru_list }}
    - name:      {{ .name | quote }}
      vf_index:  {{ .vf_index }}
      du_mac:    {{ .du_mac | quote }}
      ru_mac:    {{ .ru_mac | quote }}
      vlan:      {{ .vlan | quote }}
    {{- end }}
