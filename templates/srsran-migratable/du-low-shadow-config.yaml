{{- /*
  ConfigMap for the shadow DU-Low — the "new" instance used during live migration.

  Shadow DU-Low lifecycle:
    1. Starts with start_in_shadow_mode: true
    2. Connects to the proxy's shadow registration port (10005) and announces itself
    3. Proxy begins mirroring slot indications → PHY warms up (warmup_slots)
    4. Operator triggers migration (e.g. via proxy REST/CLI)
    5. Proxy drains HARQs on DU-High, then switches FAPI forwarding to shadow
    6. Shadow becomes the new active DU-Low; original active can be shut down

  Requires extra-config.yaml field: shadow_node (k8s node for the new hardware).
  FAPI listen ports differ from active (10003/10004) so both can coexist on the
  same node during the transition window if needed.
*/ -}}
{{- $ru_list_yaml := $.Files.Get "extra-config.yaml" | fromYaml -}}

{{- $radios := list }}
{{- range $desiredRadio := .Values.desiredRadios }}
  {{- if eq $desiredRadio.type "srsran-migratable" }}
    {{- range $radio := $ru_list_yaml.ru_list }}
      {{- if and (eq $radio.name $desiredRadio.name) ($radio.shadow_node) }}
        {{- $radios = append $radios $radio }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}

{{- range $radio := $radios }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: srsran-mig-du-low-shadow-{{ $radio.name | lower }}-config
  namespace: srsran-migratable
data:
  du_low.conf: |
    log:
      filename: stdout
      all_level: error
      phy_level: error

    expert_phy:
      max_request_headroom_slots: 6
      max_proc_delay: 6
      allow_request_on_empty_uplink_slot: true

    # Shadow FAPI listen ports — different from active (10001/10002) so both
    # instances can coexist on the same node during the handover window.
    split6_network:
      use_network: true
      log_level: error
      control_bind_ip: 0.0.0.0
      control_port: 10003
      slot_bind_ip: 0.0.0.0
      slot_port: 10004

    # Shadow mode: on startup connect to the proxy's shadow registration
    # port and wait to receive mirrored slot indications for PHY warmup.
    migration:
      enabled: true
      log_level: info
      controller_bind_ip: 0.0.0.0
      controller_port: 9991
      warmup_slots: 100
      min_ready_slots: 20
      start_in_shadow_mode: true
      # Proxy service DNS — stable regardless of pod restarts.
      proxy_address: srsran-mig-proxy-{{ $radio.name | lower }}-svc.srsran-migratable.svc.cluster.local
      proxy_registration_port: 10005

    ru_ofh:
      t1a_max_cp_dl: 535
      t1a_min_cp_dl: 286
      t1a_max_cp_ul: 535
      t1a_min_cp_ul: 286
      t1a_max_up: 390
      t1a_min_up: 80
      ta4_max: 500
      ta4_min: 25
      is_prach_cp_enabled: false
      ignore_ecpri_payload_size: true
      compr_method_ul: bfp
      compr_bitwidth_ul: 9
      compr_method_dl: bfp
      compr_bitwidth_dl: 9
      compr_method_prach: bfp
      compr_bitwidth_prach: 9
      enable_ul_static_compr_hdr: true
      enable_dl_static_compr_hdr: true
      iq_scaling: 10
      cells:
      - network_interface: {{ $radio.shadow_dpdk_pci_id | default $radio.dpdk_pci_id }}
        ru_mac_addr: {{ $radio.shadow_ru_mac | default $radio.ru_mac }}
        du_mac_addr: {{ $radio.shadow_du_mac | default $radio.du_mac }}
        vlan_tag_cp: {{ $radio.vlan }}
        vlan_tag_up: {{ $radio.vlan }}
        prach_port_id: [4, 5, 6, 7]
        dl_port_id: [0, 1, 2, 3]
        ul_port_id: [0, 1, 2, 3]

    hal:
      eal_args: "--lcores (0-1)@({{ $radio.shadow_cpu_cores_p2 | default $radio.cpu_cores_p2 }}) -a {{ $radio.shadow_dpdk_pci_id | default $radio.dpdk_pci_id }}"

    expert_execution:
      affinities:
        ru_timing_cpu: {{ $radio.shadow_cpu_cores_p1 | default $radio.cpu_cores_p1 }}
{{- end }}
