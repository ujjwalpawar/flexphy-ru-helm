{{- /*
  Privileged DaemonSet that applies TCP sysctl tunings on every srsran worker
  node at boot time.  Settings target low-latency, high-throughput FAPI TCP
  communication between DU-High and DU-Low pods.

  Also disables transparent hugepages via hostPath /sys mount to prevent
  latency spikes from background THP compaction.

  Runs on all nodes labelled srsran-worker=true (same set as nic-vf-setup).
  Uses an initContainer so the pause container keeps the DaemonSet pod alive
  without re-applying on every restart.
*/ -}}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-sysctl-tuning
  namespace: srsran-migratable
  labels:
    app: node-sysctl-tuning
spec:
  selector:
    matchLabels:
      app: node-sysctl-tuning
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: node-sysctl-tuning
    spec:
      hostNetwork: true
      hostPID: true
      nodeSelector:
        srsran-worker: "true"
      tolerations:
        - operator: Exists
          effect: NoSchedule

      volumes:
        - name: host-sys-mm
          hostPath:
            path: /sys/kernel/mm

      initContainers:
        - name: sysctl-apply
          image: busybox:1.36
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: host-sys-mm
              mountPath: /sys/kernel/mm
          command:
            - sh
            - -c
            - |
              set -e
              echo "[sysctl-tuning] Applying performance tunings..."

              # --- TCP buffer sizes ---
              sysctl -w net.core.rmem_max=16777216
              sysctl -w net.core.wmem_max=16777216
              sysctl -w net.core.rmem_default=1048576
              sysctl -w net.core.wmem_default=1048576
              sysctl -w net.ipv4.tcp_rmem="4096 1048576 16777216"
              sysctl -w net.ipv4.tcp_wmem="4096 1048576 16777216"

              # --- Latency reduction ---
              sysctl -w net.ipv4.tcp_fastopen=3
              sysctl -w net.ipv4.tcp_timestamps=0
              sysctl -w net.ipv4.tcp_sack=0
              sysctl -w net.ipv4.tcp_slow_start_after_idle=0
              sysctl -w net.ipv4.tcp_autocorking=0
              sysctl -w net.ipv4.tcp_moderate_rcvbuf=0
              sysctl -w net.ipv4.tcp_mtu_probing=0

              # --- Busy polling (reduces wakeup latency for FAPI slot loop) ---
              sysctl -w net.core.busy_poll=50
              sysctl -w net.core.busy_read=50

              # --- Backlog / connection limits ---
              sysctl -w net.core.somaxconn=65535
              sysctl -w net.core.netdev_max_backlog=65535
              sysctl -w net.ipv4.tcp_max_syn_backlog=65535

              # --- Memory pressure ---
              sysctl -w net.ipv4.tcp_mem="786432 1048576 1572864"

              # --- Keepalive ---
              sysctl -w net.ipv4.tcp_keepalive_time=60
              sysctl -w net.ipv4.tcp_keepalive_intvl=10
              sysctl -w net.ipv4.tcp_keepalive_probes=3

              # --- Connection reuse ---
              sysctl -w net.ipv4.tcp_tw_reuse=1
              sysctl -w net.ipv4.tcp_fin_timeout=10

              # --- Port range ---
              sysctl -w net.ipv4.ip_local_port_range="1024 65535"

              # --- Congestion control (BBR) ---
              sysctl -w net.core.default_qdisc=fq
              sysctl -w net.ipv4.tcp_congestion_control=bbr

              # --- Misc TCP ---
              sysctl -w net.ipv4.tcp_no_metrics_save=1

              # --- Kernel scheduler (lower wakeup latency for DU-High threads) ---
              # These may be absent on PREEMPT_RT kernels — skip gracefully.
              sysctl -w kernel.sched_min_granularity_ns=100000   || echo "[sysctl-tuning] SKIP: sched_min_granularity_ns"
              sysctl -w kernel.sched_wakeup_granularity_ns=100000 || echo "[sysctl-tuning] SKIP: sched_wakeup_granularity_ns"
              sysctl -w kernel.sched_migration_cost_ns=5000000    || echo "[sysctl-tuning] SKIP: sched_migration_cost_ns"

              # --- NUMA balancing off (cores already pinned) ---
              sysctl -w kernel.numa_balancing=0 || echo "[sysctl-tuning] SKIP: numa_balancing"

              # --- Allow RT threads to run without throttle (DU-Low: chrt -f 99) ---
              sysctl -w kernel.sched_rt_runtime_us=-1 || echo "[sysctl-tuning] SKIP: sched_rt_runtime_us"

              # --- Transparent hugepages off (prevents THP compaction latency spikes) ---
              echo never > /sys/kernel/mm/transparent_hugepage/enabled
              echo never > /sys/kernel/mm/transparent_hugepage/defrag

              echo "[sysctl-tuning] Done."

      containers:
        - name: pause
          image: gcr.io/google_containers/pause:3.2
          resources:
            requests:
              cpu: "1m"
              memory: "4Mi"
            limits:
              cpu: "10m"
              memory: "16Mi"

      terminationGracePeriodSeconds: 10
