{{- /*
  Shadow DU-Low pod — only rendered when a radio has shadow_node defined
  in extra-config.yaml.  Add shadow_node (and optionally shadow_dpdk_pci_id,
  shadow_ru_mac, shadow_du_mac, shadow_cpu_cores_p1/p2) to a radio entry
  to deploy the shadow instance that will be promoted during live migration.

  Example extra-config.yaml entry:
    - name: "INF1"
      ...existing fields...
      shadow_node: "k8s-worker7"
      shadow_dpdk_pci_id: "0000:87:01.0"
      shadow_ru_mac: "70:b3:d5:e1:5f:aa"
      shadow_du_mac: "00:11:22:33:88:99"
      shadow_cpu_cores_p1: "50"
      shadow_cpu_cores_p2: "33-49"
*/ -}}
{{- $ru_list_yaml := $.Files.Get "extra-config.yaml" | fromYaml -}}

{{- $radios := list }}
{{- range $desiredRadio := .Values.desiredRadios }}
  {{- if eq $desiredRadio.type "srsran-migratable" }}
    {{- range $radio := $ru_list_yaml.ru_list }}
      {{- if and (eq $radio.name $desiredRadio.name) ($radio.shadow_node) }}
        {{- $radios = append $radios $radio }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}

{{- range $radio := $radios }}
---
apiVersion: v1
kind: Pod
metadata:
  name: srsran-mig-du-low-shadow-{{ $radio.name | lower }}
  namespace: srsran-migratable
  labels:
    app: srsran-mig-du-low-shadow
    du-name: {{ $radio.name | lower }}
  annotations:
    # Describes the migration role of this pod for operators.
    migration-role: shadow
    migration-target-for: srsran-mig-du-low-{{ $radio.name | lower }}
spec:
  # Schedule on the new target node (different hardware/firmware).
  nodeSelector:
    kubernetes.io/hostname: {{ $radio.shadow_node | quote }}
  containers:
  - name: du-low-shadow
    image: {{ $.Values.image  }}
    imagePullPolicy: Always
    command: ["bash", "-c"]
    args:
    - srsdu_low -c /config/du_low.conf
    securityContext:
      privileged: true   # Required for DPDK + hugepages
    resources:
      requests:
        memory: "16Gi"
        hugepages-1Gi: "8Gi"
      limits:
        memory: "16Gi"
        hugepages-1Gi: "8Gi"
    ports:
    - name: fapi-ctrl
      containerPort: 10003
      protocol: TCP
    - name: fapi-slot
      containerPort: 10004
      protocol: TCP
    - name: mig-ctrl
      containerPort: 9991
      protocol: TCP
    volumeMounts:
    - name: hugepage
      mountPath: /dev/hugepages
    - name: du-low-shadow-config
      mountPath: /config
  volumes:
  - name: hugepage
    emptyDir:
      medium: HugePages
  - name: du-low-shadow-config
    configMap:
      name: srsran-mig-du-low-shadow-{{ $radio.name | lower }}-config
      items:
      - key: du_low.conf
        path: du_low.conf
{{- end }}
