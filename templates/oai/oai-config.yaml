{{- /*
  Read in the RU configuration information from the configmap
*/}}
{{- $ru_list_yaml := $.Files.Get "extra-config.yaml" | fromYaml }}
{{/*- $configmap := (lookup "v1" "ConfigMap" "default" "ru-testconfig") */}}
{{/*- $ru_list_yaml := get $configmap.data "rulist.yaml" | fromYaml */}}

{{- /*
  Apply this template to only the desired radios, making sure to also
  pickup the necessary config for the radio from the outside source.
*/}}
{{- range $desiredRadio := .Values.desiredRadios }}
{{- range $radio := $ru_list_yaml.ru_list }}
{{ if and (eq $radio.name $desiredRadio.name) (eq $desiredRadio.type "oai") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: oai-{{ $desiredRadio.name | lower }}-config
  namespace: oai
data:
  gnb.conf: |
    Active_gNBs = ( "gNB-OAI-{{ $desiredRadio.name }}");
    # Asn1_verbosity, choice in: none, info, annoying
    Asn1_verbosity = "none";

    gNBs =
    (
     {
        ////////// Identification parameters:
        gNB_ID    =  {{ $radio.vlan }};

        gNB_name  =  "gNB-OAI-{{ $desiredRadio.name }}";

        // Tracking area code, 0x0000 and 0xfffe are reserved values
        tracking_area_code  =  1;
        plmn_list = ({ mcc = 999; mnc = 99; mnc_length = 2; snssaiList = ({ sst = 1; }); });
        nr_cellid = 1;

        ////////// Physical parameters:

        pdsch_AntennaPorts_XP = 2;
        pdsch_AntennaPorts_N1 = 2;
        pusch_AntennaPorts    = 2;
        maxMIMO_layers        = 2;
        do_CSIRS              = 1;
        do_SRS                = 1;
        sib1_tda                            = 15;
        #force_UL256qam_off    = 1;

        servingCellConfigCommon = (
        {
     #spCellConfigCommon

          physCellId                                                    = 0;
          n_TimingAdvanceOffset                                         = 1;
    #  downlinkConfigCommon
        #frequencyInfoDL
          # center frequency = 3350.01 MHz
          # selected SSB frequency = 3349.92 MHz
          absoluteFrequencySSB                                          = 660000;
          dl_frequencyBand                                              = 77;
          # frequency point A = 3300.87 MHz
          dl_absoluteFrequencyPointA                                    = 656724;
          #scs-SpecificCarrierList
            dl_offstToCarrier                                           = 0;
    # subcarrierSpacing
    # 0=kHz15, 1=kHz30, 2=kHz60, 3=kHz120
            dl_subcarrierSpacing                                        = 1;
            dl_carrierBandwidth                                         = 273;
         #initialDownlinkBWP
          #genericParameters
           initialDLBWPlocationAndBandwidth                             = 1099; #38.101-1 Table 5.3.2-1
           #
    # subcarrierSpacing
    # 0=kHz15, 1=kHz30, 2=kHz60, 3=kHz120
            initialDLBWPsubcarrierSpacing                               = 1;
          #pdcch-ConfigCommon
            initialDLBWPcontrolResourceSetZero                          = 11;
            initialDLBWPsearchSpaceZero                                 = 0;

      #uplinkConfigCommon
         #frequencyInfoUL
          ul_frequencyBand                                              = 77;
          #scs-SpecificCarrierList
          ul_offstToCarrier                                             = 0;
    # subcarrierSpacing
    # 0=kHz15, 1=kHz30, 2=kHz60, 3=kHz120
          ul_subcarrierSpacing                                          = 1;
          ul_carrierBandwidth                                           = 273;
          pMax                                                          = 23;
         #initialUplinkBWP
          #genericParameters
            initialULBWPlocationAndBandwidth                            = 1099;
    # subcarrierSpacing
    # 0=kHz15, 1=kHz30, 2=kHz60, 3=kHz120
            initialULBWPsubcarrierSpacing                               = 1;
          #rach-ConfigCommon
            #rach-ConfigGeneric
              prach_ConfigurationIndex                                  = 152;
    #prach_msg1_FDM
    #0 = one, 1=two, 2=four, 3=eight
              prach_msg1_FDM                                            = 0;
              prach_msg1_FrequencyStart                                 = 0;
              zeroCorrelationZoneConfig                                 = 0;
              preambleReceivedTargetPower                               = -100;
    #preamblTransMax (0...10) = (3,4,5,6,7,8,10,20,50,100,200)
              preambleTransMax                                          = 8;
    #powerRampingStep
    # 0=dB0,1=dB2,2=dB4,3=dB6
            powerRampingStep                                            = 3;
            ra_ResponseWindow                                           = 5;
    #ssb_perRACH_OccasionAndCB_PreamblesPerSSB_PR
    #1=oneeighth,2=onefourth,3=half,4=one,5=two,6=four,7=eight,8=sixteen
            ssb_perRACH_OccasionAndCB_PreamblesPerSSB_PR                = 4;
    #one (0..15) 4,8,12,16,...60,64
            ssb_perRACH_OccasionAndCB_PreamblesPerSSB                   = 15;
    #ra_ContentionResolutionTimer
    #(0..7) 8,16,24,32,40,48,56,64
            ra_ContentionResolutionTimer                                = 7;
            rsrp_ThresholdSSB                                           = 19;
    #prach-RootSequenceIndex_PR
    #1 = 839, 2 = 139
            prach_RootSequenceIndex_PR                                  = 2;
            prach_RootSequenceIndex                                     = 1;
            # SCS for msg1, can only be 15 for 30 kHz < 6 GHz, takes precendence over the one derived from prach-ConfigIndex
            #
            msg1_SubcarrierSpacing                                      = 1,
    # restrictedSetConfig
    # 0=unrestricted, 1=restricted type A, 2=restricted type B
            restrictedSetConfig                                         = 0,

    # this is the offset between the last PRACH preamble power and the Msg3 PUSCH, 2 times the field value in dB
            msg3_DeltaPreamble                                          = 2;
            p0_NominalWithGrant                                         = -96;

    # pucch-ConfigCommon setup :
    # pucchGroupHopping
    # 0 = neither, 1= group hopping, 2=sequence hopping
            pucchGroupHopping                                           = 0;
            hoppingId                                                   = 0;
            p0_nominal                                                  = -96;

          ssb_PositionsInBurst_Bitmap                                   = 0x1;

    # ssb_periodicityServingCell
    # 0 = ms5, 1=ms10, 2=ms20, 3=ms40, 4=ms80, 5=ms160, 6=spare2, 7=spare1
          ssb_periodicityServingCell                                    = 2;

    # dmrs_TypeA_position
    # 0 = pos2, 1 = pos3
          dmrs_TypeA_Position                                           = 0;

    # subcarrierSpacing
    # 0=kHz15, 1=kHz30, 2=kHz60, 3=kHz120
          subcarrierSpacing                                             = 1;


      #tdd-UL-DL-ConfigurationCommon
    # subcarrierSpacing
    # 0=kHz15, 1=kHz30, 2=kHz60, 3=kHz120
          referenceSubcarrierSpacing                                    = 1;
          # pattern1
          # dl_UL_TransmissionPeriodicity
          # 0=ms0p5, 1=ms0p625, 2=ms1, 3=ms1p25, 4=ms2, 5=ms2p5, 6=ms5, 7=ms10
          dl_UL_TransmissionPeriodicity                                 = 6;
          nrofDownlinkSlots                                             = 7;
          nrofDownlinkSymbols                                           = 6;
          nrofUplinkSlots                                               = 2;
          nrofUplinkSymbols                                             = 4;

      ssPBCH_BlockPower                                                 = 0;
      }

      );


        # ------- SCTP definitions
        SCTP :
        {
            # Number of streams to use in input/output
            SCTP_INSTREAMS  = 2;
            SCTP_OUTSTREAMS = 2;
        };


        ////////// AMF parameters:
        amf_ip_address = ({ ipv4 = "{{ $.Values.amf_ip }}"; });

        NETWORK_INTERFACES :
        {
            GNB_IPV4_ADDRESS_FOR_NG_AMF              = "__GNB_BIND_ADDR__";
            GNB_IPV4_ADDRESS_FOR_NGU                 = "__GNB_BIND_ADDR__";
            GNB_PORT_FOR_S1U                         = 2152; # Spec 2152
        };
      }
    );

    MACRLCs = (
    {
      num_cc                      = 1;
      tr_s_preference             = "local_L1";
      tr_n_preference             = "local_RRC";
      pusch_TargetSNRx10          = 180;
      pucch_TargetSNRx10          = 220;
      dl_bler_target_upper        = .35;
      dl_bler_target_lower        = .15;
      ul_bler_target_upper        = .35;
      ul_bler_target_lower        = .15;
      pusch_FailureThres          = 1000;
      ul_max_mcs                  = 28;
      min_grant_prb               = 10;
    }
    );

    L1s = (
    {
      num_cc = 1;
      tr_n_preference = "local_mac";
      prach_dtx_threshold = 100;
      pucch0_dtx_threshold = 80;
      pusch_dtx_threshold = 10;
      max_ldpc_iterations = 15;
      tx_amp_backoff_dB = 12; # needs to match O-RU configuration
      L1_rx_thread_core = {{ $radio.cpu_cores_p1 | int | add 6 }};
      L1_tx_thread_core = {{ $radio.cpu_cores_p1 | int | add 5 }}; # relevant after merge of l1_tx_thread
      phase_compensation = 0; # needs to match O-RU configuration
    }
    );

    RUs = (
    {
      local_rf       = "no";
      nb_tx          = 4;
      nb_rx          = 2;
      att_tx         = 0;
      att_rx         = 0;
      bands          = [77];
      max_pdschReferenceSignalPower = -27;
      max_rxgain                    = 75;
      sf_extension                  = 0;
      eNB_instances  = [0];
      ru_thread_core = {{ $radio.cpu_cores_p1 | int | add 4 }};
      sl_ahead       = 10;
      tr_preference  = "raw_if4p5"; # important: activate FHI7.2
      do_precoding   = 0; # needs to match O-RU configuration
    }
    );
    security = {
      # preferred ciphering algorithms
      # the first one of the list that an UE supports in chosen
      # valid values: nea0, nea1, nea2, nea3
      ciphering_algorithms = ( "nea0" );

      # preferred integrity algorithms
      # the first one of the list that an UE supports in chosen
      # valid values: nia0, nia1, nia2, nia3
      integrity_algorithms = ( "nia2", "nia0" );

      # setting 'drb_ciphering' to "no" disables ciphering for DRBs, no matter
      # what 'ciphering_algorithms' configures; same thing for 'drb_integrity'
      drb_ciphering = "yes";
      drb_integrity = "no";
    };

    log_config :
    {
      global_log_level = "info";
      hw_log_level     = "info";
      nr_phy_log_level    = "info";
      phy_log_level    = "info";
      nr_mac_log_level    = "info";
      rlc_log_level    = "info";
      pdcp_log_level   = "info";
      rrc_log_level    = "info";
      ngap_log_level   = "info";
      f1ap_log_level   = "info";
    };

    fhi_72 = {
      dpdk_devices = ("{{ $radio.dpdk_pci_id }}"); # one VF can be used as well
      file_prefix = "oai_{{ $radio.name | lower }}";
      dpdk_mem_size = 0;
      system_core = {{ $radio.cpu_cores_p1 | int }};
      io_core = {{ $radio.cpu_cores_p1 | int | add 1 }};
      worker_cores = ({{ $radio.cpu_cores_p1 | int | add 2 }},{{ $radio.cpu_cores_p1 | int | add 3 }});
      du_addr = ("{{ $radio.du_mac }}", "{{ $radio.du_mac }}");
      ru_addr = ("{{ $radio.ru_mac }}", "{{ $radio.ru_mac }}");
      mtu = 9600;
      dpdk_iova_mode = "VA";
      vlan_tag = ({{ $radio.vlan }});
      fh_config = ({
        T1a_cp_dl = (419, 470);
        T1a_cp_ul = (285, 336);
        T1a_up = (294, 345);
        T2a_cp_dl = (285, 429); # (min, max)
        T2a_cp_ul = (285, 429); # (min, max)
        T2a_up = (125, 428); # (min, max)
        Ta3 = (130, 170); # (min, max)
        Ta4 = (0, 200);
        ru_config = {
          iq_width = 9;
          iq_width_prach = 9;
        };
      });
    };
{{ end }}
{{ end }}
{{ end }}